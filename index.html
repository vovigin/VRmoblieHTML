<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <video id="input_video" style="display:none;"></video>

  <a-scene>
    <a-sky color="#222"></a-sky>
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

    <a-box class="grabbable" position="-0.5 1.5 -1.5" scale="0.2 0.2 0.2" color="orange"></a-box>
    <a-sphere class="grabbable" position="0.5 1.5 -1.5" radius="0.15" color="cyan"></a-sphere>
    <a-box class="grabbable" position="0 1.2 -2" scale="0.3 0.3 0.3" color="tomato"></a-box>

    <a-entity id="hand0"></a-entity>
    <a-entity id="hand1"></a-entity>

    <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <script>
    const videoElement = document.getElementById('input_video');
    const handContainers = [document.getElementById('hand0'), document.getElementById('hand1')];
    const grabbables = document.querySelectorAll('.grabbable');
    
    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4], [0,5],[5,6],[6,7],[7,8],
      [9,10],[10,11],[11,12], [13,14],[14,15],[15,16],
      [17,18],[18,19],[19,20], [5,9],[9,13],[13,17],[0,17]
    ];

    const handModels = [];
    const grabbedObjects = [null, null]; // Храним, какой объект в какой руке (0 или 1)

    // Инициализация моделей рук (как в прошлом шаге)
    handContainers.forEach((container) => {
      const joints = [];
      const bones = [];
      for (let i = 0; i < 21; i++) {
        let s = document.createElement('a-sphere');
        s.setAttribute('radius', '0.02');
        s.setAttribute('color', 'white');
        container.appendChild(s);
        joints.push(s);
      }
      CONNECTIONS.forEach(() => {
        let c = document.createElement('a-cylinder');
        c.setAttribute('radius', '0.01');
        c.setAttribute('color', 'white');
        container.appendChild(c);
        bones.push(c);
      });
      handModels.push({ joints, bones });
    });

    function onResults(results) {
      // Скрываем руки, если их нет в кадре
      handModels.forEach(m => {
        m.joints.forEach(j => j.setAttribute('visible', false));
        m.bones.forEach(b => b.setAttribute('visible', false));
      });

      if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((landmarks, hIdx) => {
          if (hIdx > 1) return;
          const model = handModels[hIdx];
          
          // Конвертируем координаты MediaPipe в мир VR
          const points = landmarks.map(lm => ({
            x: (0.5 - lm.x) * 3,
            y: (0.5 - lm.y) * 2 + 1.6,
            z: -lm.z * 2 - 1.2
          }));

          // Отрисовка суставов и костей
          points.forEach((p, i) => {
            model.joints[i].setAttribute('position', p);
            model.joints[i].setAttribute('visible', true);
          });
          CONNECTIONS.forEach((conn, i) => {
            const start = new THREE.Vector3(points[conn[0]].x, points[conn[0]].y, points[conn[0]].z);
            const end = new THREE.Vector3(points[conn[1]].x, points[conn[1]].y, points[conn[1]].z);
            const dist = start.distanceTo(end);
            const pos = start.clone().lerp(end, 0.5);
            const bone = model.bones[i];
            bone.setAttribute('position', pos);
            bone.setAttribute('height', dist);
            bone.setAttribute('visible', true);
            const dir = end.clone().sub(start).normalize();
            bone.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir));
          });

          // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ ---
          const indexTip = points[8]; // Кончик указательного пальца
          const thumbTip = points[4];  // Кончик большого пальца
          
          // Считаем, что рука "сжата", если указательный и большой пальцы близко друг к другу
          const pinchDist = Math.sqrt(
            Math.pow(indexTip.x - thumbTip.x, 2) + 
            Math.pow(indexTip.y - thumbTip.y, 2) + 
            Math.pow(indexTip.z - thumbTip.z, 2)
          );
          
          const isPinching = pinchDist < 0.1;

          if (isPinching) {
            // Если мы уже что-то держим, двигаем это за пальцем
            if (grabbedObjects[hIdx]) {
              grabbedObjects[hIdx].setAttribute('position', indexTip);
            } else {
              // Если рука пуста, ищем ближайший объект для захвата
              grabbables.forEach(obj => {
                const objPos = obj.object3D.position;
                const distToObj = Math.sqrt(
                  Math.pow(indexTip.x - objPos.x, 2) + 
                  Math.pow(indexTip.y - objPos.y, 2) + 
                  Math.pow(indexTip.z - objPos.z, 2)
                );

                if (distToObj < 0.2) {
                  grabbedObjects[hIdx] = obj;
                  obj.setAttribute('opacity', '0.6'); // Визуальный эффект захвата
                }
              });
            }
          } else {
            // Если пальцы разжаты, отпускаем объект
            if (grabbedObjects[hIdx]) {
              grabbedObjects[hIdx].setAttribute('opacity', '1.0');
              grabbedObjects[hIdx] = null;
            }
          }
        });
      }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => await hands.send({image: videoElement}),
      width: 1280, height: 720
    });
    camera.start();
  </script>
</body>
</html>
